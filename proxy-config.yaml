# Mihomo 代理配置 —— 参考模板
# 部署步骤：
#   1. 编辑 proxies 及 proxy-groups 填入你的节点
#   2. 在管理面板 → 服务商 → HTTP 代理 填写 http://mihomo:7890
#
# 更多协议示例见 https://wiki.metacubex.one/config/proxies/

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info

dns:
  enable: true
  nameserver:
    - 1.1.1.1
    - 8.8.8.8

proxies:
  - name: "proxy"
    type: ss
    server: your-server.com
    port: 443
    cipher: aes-256-gcm
    password: "your-password"

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - "proxy"
      - DIRECT

rules:
  - MATCH,Proxy
