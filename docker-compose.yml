services:
  api:
    image: ${AIQ_API_IMAGE:-ai_question_api}:${AIQ_API_TAG:-latest}
    build:
      context: ../AI_Question
      dockerfile: Dockerfile
      args:
        INSTALL_TEXLIVE: "${INSTALL_TEXLIVE:-false}"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    volumes:
      - aiq_data:/app/data
      - aiq_output:/app/output
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  dashboard:
    image: ${AIQ_WEB_IMAGE:-ai_question_dashboard}:${AIQ_WEB_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://api:8000}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      BASE_PATH: ${BASE_PATH:-}
    ports:
      - "${AIQ_WEB_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  aiq_data:
  aiq_output:
