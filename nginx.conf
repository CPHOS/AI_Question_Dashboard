server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow larger source-material uploads (POST /api/tasks/upload).
    client_max_body_size 32m;

    # Gzip static assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-lived caching for fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse-proxy API + health to the backend (BACKEND_URL is substituted at startup).
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Generation tasks are async; keep proxy timeouts generous anyway.
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /health {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $host;
    }

    location /version {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $host;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
